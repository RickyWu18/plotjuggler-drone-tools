name: Release / macOS

on:
  workflow_dispatch:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

env:
  PJ_TAG: '3.17.2'

jobs:
  macos:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-${{ matrix.arch }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            arch: arm64
    env:
      CPM_SOURCE_CACHE: ${{ github.workspace }}/cpm_cache

    steps:
      - name: Checkout PlotJuggler-Drone
        uses: actions/checkout@v6
        with:
          path: drone
          submodules: recursive

      - name: Cache PlotJuggler install
        id: cache-pj
        uses: actions/cache@v5
        with:
          path: pj_install
          key: pj-install-macos-${{ matrix.arch }}-${{ env.PJ_TAG }}

      - name: Clone PlotJuggler ${{ env.PJ_TAG }}
        if: steps.cache-pj.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch ${{ env.PJ_TAG }} \
            https://github.com/facontidavide/PlotJuggler.git PlotJuggler

      - name: Install Qt5 via Homebrew
        run: brew install qt@5

      - name: Cache CPM packages
        if: steps.cache-pj.outputs.cache-hit != 'true'
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/cpm_cache
          key: cpm-macos-${{ matrix.arch }}-pj-${{ env.PJ_TAG }}
          restore-keys: cpm-macos-${{ matrix.arch }}-

      - name: Configure PlotJuggler
        if: steps.cache-pj.outputs.cache-hit != 'true'
        run: |
          cmake -S PlotJuggler -B pj_build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/pj_install \
            "-DCMAKE_PREFIX_PATH=$(brew --prefix qt@5)"

      - name: Build PlotJuggler
        if: steps.cache-pj.outputs.cache-hit != 'true'
        run: cmake --build pj_build -- -j$(sysctl -n hw.logicalcpu)

      - name: Install PlotJuggler
        if: steps.cache-pj.outputs.cache-hit != 'true'
        run: cmake --install pj_build

      - name: Configure drone plugins
        run: |
          cmake -S drone -B drone_build \
            -DCMAKE_BUILD_TYPE=Release \
            -DPJ_INSTALL=${{ github.workspace }}/pj_install \
            "-DCMAKE_PREFIX_PATH=$(brew --prefix qt@5)"

      - name: Build drone plugins
        run: cmake --build drone_build -- -j$(sysctl -n hw.logicalcpu)

      - name: Package plugins
        run: |
          SAFE_REF="${GITHUB_REF_NAME//\//-}"
          ZIP_NAME="PlotJuggler-Drone-${SAFE_REF}-macOS-${{ matrix.arch }}.zip"
          zip -j "$ZIP_NAME" drone_build/bin/*.dylib
          echo "ZIP_NAME=$ZIP_NAME" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ZIP_NAME }}
          path: ${{ env.ZIP_NAME }}

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ env.ZIP_NAME }}
          fail_on_unmatched_files: true
