name: Release / Ubuntu

on:
  workflow_dispatch:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

env:
  PJ_TAG: '3.17.2'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ubuntu:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    env:
      CPM_SOURCE_CACHE: ${{ github.workspace }}/cpm_cache

    steps:
      - name: Checkout PlotJuggler-Drone
        uses: actions/checkout@v6
        with:
          path: drone
          submodules: recursive
          shallow-submodules: true

      - name: Cache PlotJuggler install
        id: cache-pj
        uses: actions/cache@v5
        with:
          path: pj_install
          key: pj-install-ubuntu-${{ env.PJ_TAG }}

      - name: Clone PlotJuggler ${{ env.PJ_TAG }}
        if: steps.cache-pj.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch ${{ env.PJ_TAG }} \
            https://github.com/facontidavide/PlotJuggler.git PlotJuggler

      - name: Install Qt5 and build dependencies
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: >
            qtbase5-dev
            libqt5svg5-dev
            libqt5websockets5-dev
            libqt5opengl5-dev
            libqt5x11extras5-dev
            libqt5serialport5-dev
            libprotoc-dev
            libmosquitto-dev
            libcurl4-openssl-dev
            zip
          version: 1.0

      - name: Cache CPM packages
        if: steps.cache-pj.outputs.cache-hit != 'true'
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/cpm_cache
          key: cpm-ubuntu-pj-${{ env.PJ_TAG }}
          restore-keys: cpm-ubuntu-

      - name: Configure PlotJuggler
        if: steps.cache-pj.outputs.cache-hit != 'true'
        run: |
          cmake -S PlotJuggler -B pj_build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/pj_install

      - name: Build PlotJuggler
        if: steps.cache-pj.outputs.cache-hit != 'true'
        run: cmake --build pj_build -- -j$(nproc)

      - name: Install PlotJuggler
        if: steps.cache-pj.outputs.cache-hit != 'true'
        run: cmake --install pj_build

      - name: Configure drone plugins
        run: |
          cmake -S drone -B drone_build \
            -DCMAKE_BUILD_TYPE=Release \
            -DPJ_INSTALL=${{ github.workspace }}/pj_install

      - name: Build drone plugins
        run: cmake --build drone_build -- -j$(nproc)

      - name: Package plugins
        run: |
          SAFE_REF="${GITHUB_REF_NAME//\//-}"
          ZIP_NAME="PlotJuggler-Drone-${SAFE_REF}-Ubuntu-x86_64.zip"
          zip -j "$ZIP_NAME" drone_build/bin/*.so
          echo "ZIP_NAME=$ZIP_NAME" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ZIP_NAME }}
          path: ${{ env.ZIP_NAME }}

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ env.ZIP_NAME }}
          fail_on_unmatched_files: true
