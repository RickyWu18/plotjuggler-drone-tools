name: Release / Windows

on:
  workflow_dispatch:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

env:
  PJ_TAG: '3.17.2'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      CXXFLAGS: /MP
      CPM_SOURCE_CACHE: ${{ github.workspace }}/cpm_cache

    steps:
      - name: Checkout PlotJuggler-Drone
        uses: actions/checkout@v6
        with:
          path: drone
          submodules: recursive
          shallow-submodules: true

      - name: Cache PlotJuggler install
        id: cache-pj
        uses: actions/cache@v5
        with:
          path: pj_install
          key: pj-install-windows-${{ env.PJ_TAG }}

      - name: Clone PlotJuggler ${{ env.PJ_TAG }}
        if: steps.cache-pj.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          git clone --depth 1 --branch ${{ env.PJ_TAG }} `
            https://github.com/facontidavide/PlotJuggler.git PlotJuggler

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '5.15.*'
          arch: 'win64_msvc2019_64'
          dir: '${{ github.workspace }}/qt_installation/'
          cache: 'true'

      - name: Cache CPM packages
        if: steps.cache-pj.outputs.cache-hit != 'true'
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/cpm_cache
          key: cpm-windows-pj-${{ env.PJ_TAG }}
          restore-keys: cpm-windows-

      - name: Configure PlotJuggler
        if: steps.cache-pj.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          cmake -S PlotJuggler -B pj_build `
            -A x64 `
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/pj_install" `
            -DPJ_INSTALLATION=windows `
            -DPJ_PLUGINS_DIRECTORY=bin

      - name: Build PlotJuggler
        if: steps.cache-pj.outputs.cache-hit != 'true'
        shell: pwsh
        run: cmake --build pj_build --config Release --parallel

      - name: Install PlotJuggler
        if: steps.cache-pj.outputs.cache-hit != 'true'
        shell: pwsh
        run: cmake --install pj_build --config Release

      - name: Configure drone plugins
        shell: pwsh
        run: |
          cmake -S drone -B drone_build `
            -A x64 `
            "-DPJ_INSTALL=${{ github.workspace }}/pj_install"

      - name: Build drone plugins
        shell: pwsh
        run: cmake --build drone_build --config Release --parallel

      - name: Package plugins
        shell: pwsh
        run: |
          $ref = "${{ github.ref_name }}" -replace '/', '-'
          $zipName = "PlotJuggler-Drone-$ref-Windows-x64.zip"
          Compress-Archive -Path drone_build/bin/Release/*.dll -DestinationPath $zipName
          "ZIP_NAME=$zipName" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ZIP_NAME }}
          path: ${{ env.ZIP_NAME }}

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ env.ZIP_NAME }}
          fail_on_unmatched_files: true
